name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch tool READMEs
        run: |
          mkdir -p _includes/readmes
          for tool in pget see purl yday doc sock; do
            echo "Fetching $tool README..."
            curl -sfL "https://raw.githubusercontent.com/pynosaur/${tool}/main/README.md" \
              -o "_includes/readmes/${tool}.md" || echo "Failed to fetch ${tool}"
            echo "--- ${tool} size: $(wc -c < _includes/readmes/${tool}.md) bytes"
          done
          ls -la _includes/readmes/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

