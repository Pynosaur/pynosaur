name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch tool READMEs
        run: |
          tools="pget see purl yday doc sock"
          for tool in $tools; do
            echo "Fetching $tool README..."
            curl -sL "https://raw.githubusercontent.com/pynosaur/${tool}/main/README.md" -o "/tmp/${tool}_readme.md"
            head=$(head -n 5 "pages/${tool}.md")
            echo "$head" > "pages/${tool}.md"
            echo "" >> "pages/${tool}.md"
            cat "/tmp/${tool}_readme.md" >> "pages/${tool}.md"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

